<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
:root{--bg:#0a0a0f;--card:#13131a;--border:#1e1e2e;--accent:#7c3aed;--accent2:#a78bfa;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#e2e8f0;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.admin-badge{background:#2e1010;color:#ef4444;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-left:10px;}
#connectBtn{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.wallet-pill{background:var(--border);padding:7px 13px;border-radius:8px;font-size:12px;color:var(--accent2);font-weight:500;}

.chain-toggle{display:flex;gap:6px;align-items:center;}
.chain-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.chain-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.tabs{display:flex;gap:4px;background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;}
.tab{padding:13px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}

main{max-width:1000px;margin:30px auto;padding:0 16px;}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
@media(max-width:700px){.stats-grid{grid-template-columns:1fr 1fr;}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.stat-val{font-size:24px;font-weight:800;color:var(--accent2);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
@media(max-width:600px){.action-grid{grid-template-columns:1fr;}}
.action-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.action-card h3{font-size:14px;font-weight:700;margin-bottom:6px;}
.action-card p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.action-btn{width:100%;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.action-btn:hover{opacity:.85;}
.action-btn:disabled{opacity:.4;cursor:not-allowed;}
.action-btn.primary{background:var(--accent);color:#fff;}
.action-btn.success{background:#14532d;color:var(--green);}
.action-btn.danger{background:#2e1010;color:var(--red);border:1px solid var(--red);}

.input-row{display:flex;gap:8px;margin-bottom:10px;}
.input-row input,.input-row select{flex:1;background:#0a0a0f;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--text);outline:none;}
.input-row input:focus,.input-row select:focus{border-color:var(--accent);}

.records-table{width:100%;border-collapse:collapse;font-size:12px;}
.records-table th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;}
.records-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.records-table tr:last-child td{border-bottom:none;}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.pill.success{background:#14532d;color:var(--green);}
.pill.fail{background:#2e1010;color:var(--red);}
.pill.swap{background:#1e1030;color:var(--accent2);}
.type-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--border);color:var(--accent2);}

.token-balances{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
@media(max-width:600px){.token-balances{grid-template-columns:1fr 1fr;}}
.bal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.bal-symbol{font-size:13px;font-weight:700;margin-bottom:4px;}
.bal-amount{font-size:18px;font-weight:800;color:var(--accent2);}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.not-connected{text-align:center;padding:60px 20px;color:var(--muted);}
.alert-owner{background:#2e1010;border:1px solid var(--red);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--red);margin-bottom:20px;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;max-width:280px;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--accent);color:var(--accent2);}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="admin-badge">ADMIN</span>
  </div>
  <div class="chain-toggle">
    <button class="chain-btn active" id="btnPolygon"  onclick="switchChain(137,this)">⬡ Polygon</button>
    <button class="chain-btn"        id="btnBSC"      onclick="switchChain(56,this)">◈ BNB Chain</button>
    <button class="chain-btn"        id="btnEthereum" onclick="switchChain(1,this)">◈ Ethereum</button>
    <button class="chain-btn"        id="btnBase"     onclick="switchChain(8453,this)">◈ Base</button>
    <button class="chain-btn"        id="btnArbitrum" onclick="switchChain(42161,this)">◈ Arbitrum</button>
    <button class="chain-btn"        id="btnTron"     onclick="switchToTron(this)" style="border-color:#ef0027;color:#ef0027">◈ Tron</button>
  </div>
  <div id="headerRight"><button id="connectBtn" onclick="connectWallet()">Connect Wallet</button></div>
</header>

<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" onclick="switchTab('overview',this)">Overview</div>
  <div class="tab"        onclick="switchTab('actions',this)">Actions</div>
  <div class="tab"        onclick="switchTab('records',this)">Recent Pulls</div>
</div>

<main id="main">
  <div class="not-connected"><p>👛 Connect your owner wallet to access the admin dashboard</p></div>
</main>
<div class="toast" id="toast"></div>

function showToast(msg,type="info"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className="toast",3500);
}

// ── Chain switching ────────────────────────────────────────────────────────
function switchChain(chainId, btn){
  isTronMode    = false;
  activeChainId = chainId;
  activeChain   = CHAINS[chainId];
  document.querySelectorAll(".chain-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  // Restore EVM connect button if needed
  if(!wallet){
    document.getElementById("headerRight").innerHTML =
      `<button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>`;
  }
  if(contract){ rebuildContract(); renderDashboard(); }
  else if(!wallet){
    document.getElementById("main").innerHTML =
      `<div class="not-connected"><p>👛 Connect your owner wallet to access the admin dashboard</p></div>`;
    document.getElementById("tabs").style.display = "none";
  }
}

// Called when the Tron chain button is clicked
function switchToTron(btn){
  isTronMode = true;
  document.querySelectorAll(".chain-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  if(tronWallet){
    // Already connected — just re-render the dashboard
    renderDashboard();
  } else {
    // Show a TronLink-specific connect button
    document.getElementById("headerRight").innerHTML =
      `<button id="connectBtn" onclick="connectTronLink()" style="background:#ef0027">Connect TronLink</button>`;
    document.getElementById("main").innerHTML =
      `<div class="not-connected"><p>🔴 Click <strong>Connect TronLink</strong> to manage your Tron contract</p></div>`;
    document.getElementById("tabs").style.display = "none";
  }
}

function rebuildContract(){
  contract = new ethers.Contract(activeChain.contract, CONTRACT_ABI, signer);
}

// ── Detect wallet provider (supports mobile wallet browsers) ──────────────
function getWalletProvider(){
  if(window.ethereum)          return window.ethereum;
  if(window.trustwallet)       return window.trustwallet;
  if(window.phantom?.ethereum) return window.phantom.ethereum;
  if(window.coinbaseWalletExtension) return window.coinbaseWalletExtension;
  if(window.okxwallet)         return window.okxwallet;
  if(window.bitkeep?.ethereum) return window.bitkeep.ethereum;
  return null;
}

// ── Wallet connect ─────────────────────────────────────────────────────────
async function connectWallet(){
  const wp = getWalletProvider();
  if(!wp){ showToast("No wallet detected. Install MetaMask or open in a wallet browser.","error"); return; }
  try{
    provider = new ethers.BrowserProvider(wp);
    await provider.send("eth_requestAccounts",[]);
    signer = await provider.getSigner();
    wallet = await signer.getAddress();

    const net = await provider.getNetwork();
    const cid = Number(net.chainId);
    if(cid !== activeChainId){
      if(CHAINS[cid]){
        activeChainId = cid;
        activeChain   = CHAINS[cid];
        document.querySelectorAll(".chain-btn").forEach(b=>b.classList.remove("active"));
        const _btnMap = {1:"btnEthereum", 137:"btnPolygon", 56:"btnBSC", 8453:"btnBase", 42161:"btnArbitrum"};
        if(_btnMap[cid]) document.getElementById(_btnMap[cid])?.classList.add("active");
      } else {
        showToast(`Switching to ${activeChain.name}...`,"info");
        try{
          await wp.request({method:"wallet_switchEthereumChain",params:[{chainId:activeChain.hexChainId}]});
          provider = new ethers.BrowserProvider(wp);
          signer   = await provider.getSigner();
        }catch(switchErr){
          if(switchErr.code===4902){
            await wp.request({method:"wallet_addEthereumChain",params:[{
              chainId:activeChain.hexChainId,
              chainName:activeChain.name,
              nativeCurrency:{name:activeChain.nativeSym,symbol:activeChain.nativeSym,decimals:18},
              rpcUrls:[activeChain.rpcUrl],
              blockExplorerUrls:[activeChain.explorer]
            }]});
            provider = new ethers.BrowserProvider(wp);
            signer   = await provider.getSigner();
          } else {
            showToast("Could not switch network","error"); return;
          }
        }
      }
    }

    contract = new ethers.Contract(activeChain.contract, CONTRACT_ABI, signer);
    try{
      const ownerAddr = await contract.owner();
      isOwner = wallet.toLowerCase() === ownerAddr.toLowerCase();
    }catch(e){
      isOwner = false;
      showToast("Could not read contract owner. Is the contract deployed?","error");
    }

    document.getElementById("headerRight").innerHTML =
      `<div class="wallet-pill">${isOwner?"👑":""} ${short(wallet)}</div>`;
    document.getElementById("tabs").style.display = "flex";
    await renderDashboard();
    showToast("Connected!","success");
    wp.on("accountsChanged",()=>location.reload());
    wp.on("chainChanged",()=>location.reload());
  }catch(e){ showToast("Connection cancelled","error"); }
}

// ── Records (from event logs) ──────────────────────────────────────────────
async function renderRecords(){
  document.getElementById("main").innerHTML=`<div class="loading">Fetching recent pulls from chain logs...</div>`;
  try{
    const tokenMap = {};
    activeChain.tokens.forEach(t => tokenMap[t.address.toLowerCase()] = t);

    // Query the last ~50,000 blocks (~2 days on BSC, ~30 hours on Polygon)
    const latestBlock = await provider.getBlockNumber();
    const fromBlock   = Math.max(0, latestBlock - 50000);

    let pulled = [], swapped = [];
    try{ pulled  = await contract.queryFilter("Pulled",  fromBlock, latestBlock); }catch(e){}
    try{ swapped = await contract.queryFilter("Swapped", fromBlock, latestBlock); }catch(e){}

    if(pulled.length === 0 && swapped.length === 0){
      document.getElementById("main").innerHTML =
        `<div class="empty">No pulls in the last ~50,000 blocks. Either the contract is fresh or no one has used it yet.</div>`;
      return;
    }

    // Build a unified list and sort by block number desc
    const events = [];
    for(const e of pulled){
      events.push({
        type:"Pull", block:e.blockNumber, txHash:e.transactionHash,
        user:e.args.user, token:e.args.token, amount:e.args.amount, amount2:null
      });
    }
    for(const e of swapped){
      events.push({
        type:"Swap", block:e.blockNumber, txHash:e.transactionHash,
        user:e.args.user, token:e.args.tokenIn, amount:e.args.amountIn, amount2:e.args.amountOut, tokenOut:e.args.tokenOut
      });
    }
    events.sort((a,b) => b.block - a.block);

    // Get block timestamps for the top 50
    const topEvents = events.slice(0, 50);
    const blockTimes = {};
    for(const e of topEvents){
      if(!blockTimes[e.block]){
        try{
          const blk = await provider.getBlock(e.block);
          blockTimes[e.block] = blk.timestamp;
        }catch(err){ blockTimes[e.block] = 0; }
      }
    }

    const rows = topEvents.map(e => {
      const tk  = tokenMap[e.token.toLowerCase()] || { symbol: short(e.token), decimals: 18 };
      const amt = parseFloat(ethers.formatUnits(e.amount, tk.decimals)).toFixed(4) + " " + tk.symbol;
      let extraTxt = "";
      if(e.type === "Swap" && e.tokenOut){
        const tkOut = tokenMap[e.tokenOut.toLowerCase()] || { symbol: short(e.tokenOut), decimals: 18 };
        extraTxt = " → " + parseFloat(ethers.formatUnits(e.amount2, tkOut.decimals)).toFixed(4) + " " + tkOut.symbol;
      }
      const ts = blockTimes[e.block] || 0;
      return `<tr>
        <td>${ts ? fmtDate(ts) : "—"}<br><span style="color:var(--muted);font-size:10px">${ts ? fmtTime(ts) : "—"}</span></td>
        <td style="font-family:monospace;font-size:11px"><a href="${activeChain.explorer}/address/${e.user}" target="_blank" style="color:var(--accent2)">${short(e.user)}</a></td>
        <td><span style="font-weight:700;color:var(--accent2)">${tk.symbol}</span></td>
        <td style="font-weight:600">${amt}${extraTxt}</td>
        <td><span class="pill ${e.type === "Swap" ? "swap" : "success"}">${e.type}</span></td>
        <td><a href="${activeChain.explorer}/tx/${e.txHash}" target="_blank" style="color:var(--accent2);font-size:11px">tx ↗</a></td>
      </tr>`;
    }).join("");

    document.getElementById("main").innerHTML=`
      <p class="section-title" style="margin-bottom:16px">Recent Pulls — ${activeChain.name} (last ~50k blocks, ${events.length} events)</p>
      <div style="overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:14px;">
        <table class="records-table">
          <thead><tr><th>Date</th><th>User</th><th>Token</th><th>Amount</th><th>Type</th><th>Tx</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(e){
    document.getElementById("main").innerHTML=`<div class="empty">Error: ${e.message}</div>`;
  }
}

// TRON ADMIN SECTION
// Everything below uses TronLink (window.tronWeb) — completely separate from
// the EVM ethers.js code above. Same tabs, same UI, different blockchain.
// ═══════════════════════════════════════════════════════════════════════════

// Poll getTransactionInfo every 2s until blockNumber appears (Tron ~3s blocks)
async function waitForTronAdminTx(txid){
  for(let i = 0; i < 20; i++){
    await new Promise(r => setTimeout(r, 2000));
    try{
      const info = await window.tronWeb.trx.getTransactionInfo(txid);
      if(info && info.blockNumber){
        if(info.receipt?.result === "REVERT") throw new Error("Transaction reverted");
        return info;
      }
    }catch(e){
      if(e.message && e.message !== "Transaction not found") throw e;
    }
  }
  throw new Error("Transaction not confirmed after 40 seconds");
}

// ── Connect TronLink ───────────────────────────────────────────────────────
// TronLink behaves differently depending on context:
//   • Inside TronLink's own dApp browser → window.tronWeb.defaultAddress is pre-populated
//   • Chrome extension on a regular browser → needs tronLink.request('tron_requestAccounts')
//     first, exactly like MetaMask needs eth_requestAccounts before eth_accounts works.
async function connectTronLink(){
  if(!window.tronWeb){
    showToast("TronLink not detected. Install the TronLink Chrome extension.","error");
    return;
  }

  // Step 1 — Request authorization via the modern TronLink API.
  // This opens the TronLink popup asking the user to connect to this site.
  // If tronLink.request is not available (older builds), we skip and fall through.
  try{
    if(window.tronLink?.request){
      const resp = await window.tronLink.request({ method: "tron_requestAccounts" });
      // resp.code: 200 = ok, 4001 = user rejected, 4000 = wallet locked
      if(resp?.code === 4001){ showToast("Connection rejected in TronLink.","error"); return; }
      if(resp?.code === 4000){ showToast("TronLink is locked. Unlock and try again.","error"); return; }
    } else if(window.tronWeb?.request){
      // Some TronLink versions expose .request() on tronWeb instead
      await window.tronWeb.request({ method: "tron_requestAccounts" });
    }
  }catch(e){
    // .request() not supported by this TronLink version — continue to address check
  }

  // Step 2 — Short pause so TronLink can populate defaultAddress after auth
  await new Promise(r => setTimeout(r, 400));

  // Step 3 — Read the wallet address
  const address = window.tronWeb?.defaultAddress?.base58;
  if(!address){
    showToast("Could not read TronLink address. Unlock your wallet and try again.","error");
    return;
  }
  tronWallet = address;

  // Step 4 — Verify the connected wallet is the contract owner
  try{
    const tronContract = await window.tronWeb.contract(TRON_ADMIN_ABI).at(TRON_ADMIN.contract);
    const ownerHex     = await tronContract.owner().call();
    // TronGrid returns addresses in hex (41...) — convert to Base58 for comparison
    const ownerBase58  = window.tronWeb.address.fromHex(ownerHex);
    isTronOwner        = tronWallet === ownerBase58;
  }catch(e){
    isTronOwner = false;
    showToast("Could not read contract owner. Is the Tron contract deployed?","error");
  }

  // Step 5 — Update header and render dashboard
  document.getElementById("headerRight").innerHTML =
    `<div class="wallet-pill" style="border-left:3px solid #ef0027">${isTronOwner?"👑":""} ${short(tronWallet)} <span style="color:#ef0027;font-size:10px;margin-left:4px">TRX</span></div>`;
  document.getElementById("tabs").style.display = "flex";

  await renderDashboard();
  showToast("TronLink connected!","success");
}

          <div>Token standard: <span style="color:var(--text)">TRC-20</span></div>
          <div>Pull %: <span style="color:var(--text)">95%</span></div>
          <div style="margin-top:6px"><a href="${TRON_ADMIN.explorer}/#/contract/${TRON_ADMIN.contract}" target="_blank" style="color:#ef0027">View on ${TRON_ADMIN.explorerName} ↗</a></div>
        </div>
      </div>

    </div>`;
}

// ── Tron Records ───────────────────────────────────────────────────────────
async function renderTronRecords(){
  document.getElementById("main").innerHTML = `<div class="loading">Fetching Tron events from TronGrid...</div>`;

  try{
    // TronGrid events API — returns on-chain events for our contract
    const [pulledResp, swappedResp] = await Promise.all([
      fetch(`${TRON_ADMIN.rpcApi}/v1/contracts/${TRON_ADMIN.contract}/events?event_name=Pulled&only_confirmed=true&limit=50&order_by=block_timestamp,desc`),
      fetch(`${TRON_ADMIN.rpcApi}/v1/contracts/${TRON_ADMIN.contract}/events?event_name=Swapped&only_confirmed=true&limit=50&order_by=block_timestamp,desc`),
    ]);

    const pulledData  = await pulledResp.json();
    const swappedData = await swappedResp.json();

    const pulledEvents  = pulledData?.data  || [];
    const swappedEvents = swappedData?.data || [];

    if(pulledEvents.length === 0 && swappedEvents.length === 0){
      document.getElementById("main").innerHTML =
        `<div class="empty">No Pulled or Swapped events found. Either the contract is fresh or no one has used it yet.</div>`;
      return;
    }

    // Build unified list sorted by block_timestamp desc
    const events = [];

    for(const e of pulledEvents){
      events.push({
        type:      "Pull",
        txHash:    e.transaction_id,
        block:     e.block_number,
        timestamp: e.block_timestamp,           // milliseconds
        user:      e.result?.user  || "",
        token:     e.result?.token || "",
        amount:    e.result?.amount || "0",
      });
    }
    for(const e of swappedEvents){
      events.push({
        type:      "Swap",
        txHash:    e.transaction_id,
        block:     e.block_number,
        timestamp: e.block_timestamp,
        user:      e.result?.user     || "",
        token:     e.result?.tokenIn  || "",
        tokenOut:  e.result?.tokenOut || "",
        amount:    e.result?.amountIn  || "0",
        amount2:   e.result?.amountOut || "0",
      });
    }

    events.sort((a,b) => b.timestamp - a.timestamp);
    const topEvents = events.slice(0, 50);

    // Build token lookup by address (both hex and Base58 keys for matching)
    const tokenMap = {};
    for(const t of TRON_ADMIN.tokens){
      tokenMap[t.address.toLowerCase()] = t;
      try{ tokenMap[window.tronWeb.address.toHex(t.address).toLowerCase()] = t; }catch(e){}
    }

    // Convert hex address (41...) to a displayable short string
    const tronShort = (hexAddr) => {
      try{
        const b58 = window.tronWeb.address.fromHex(hexAddr);
        return b58.slice(0,6)+"..."+b58.slice(-4);
      }catch(e){ return hexAddr.slice(0,8)+"..."; }
    };

    const fmtDate = ts => new Date(Number(ts)).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    const fmtTime = ts => new Date(Number(ts)).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

    const rows = topEvents.map(e => {
      const tokenKey = e.token?.toLowerCase() || "";
      const tk  = tokenMap[tokenKey] || { symbol: e.token?.slice(0,8)||"?", decimals: 6 };
      const amt = (Number(e.amount) / (10 ** tk.decimals)).toFixed(4) + " " + tk.symbol;

      let extraTxt = "";
      if(e.type === "Swap" && e.tokenOut){
        const tkOutKey = e.tokenOut?.toLowerCase() || "";
        const tkOut = tokenMap[tkOutKey] || { symbol: e.tokenOut?.slice(0,8)||"?", decimals: 6 };
        extraTxt = " → " + (Number(e.amount2) / (10 ** tkOut.decimals)).toFixed(4) + " " + tkOut.symbol;
      }

      return `<tr>
        <td>${fmtDate(e.timestamp)}<br><span style="color:var(--muted);font-size:10px">${fmtTime(e.timestamp)}</span></td>
        <td style="font-family:monospace;font-size:11px">
          <a href="${TRON_ADMIN.explorer}/#/address/${e.user}" target="_blank" style="color:#ef0027">${tronShort(e.user)}</a>
        </td>
        <td><span style="font-weight:700;color:#ef0027">${tk.symbol}</span></td>
        <td style="font-weight:600">${amt}${extraTxt}</td>
        <td><span class="pill ${e.type==="Swap"?"swap":"success"}">${e.type}</span></td>
        <td><a href="${TRON_ADMIN.explorer}/#/transaction/${e.txHash}" target="_blank" style="color:#ef0027;font-size:11px">tx ↗</a></td>
      </tr>`;
    }).join("");

    document.getElementById("main").innerHTML = `
      <p class="section-title" style="margin-bottom:16px">Recent Pulls — Tron (${topEvents.length} events)</p>
      <div style="overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:14px;">
        <table class="records-table">
          <thead><tr><th>Date</th><th>User</th><th>Token</th><th>Amount</th><th>Type</th><th>Tx</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(e){
    document.getElementById("main").innerHTML = `<div class="empty">Error loading Tron records: ${e.message}</div>`;
  }
}

// ── Tron withdraw actions ──────────────────────────────────────────────────
async function tronWithdraw(btn){
  const [tokenAddr, decimals] = document.getElementById("tronWithdrawToken").value.split(":");
  const to  = document.getElementById("tronWithdrawTo").value.trim();
  const amt = document.getElementById("tronWithdrawAmt").value;
  if(!to || !amt){ showToast("Fill in all fields","error"); return; }
  if(!to.startsWith("T")){ showToast("Enter a valid Tron address (starts with T)","error"); return; }

  btn.disabled = true; btn.textContent = "Withdrawing...";
  try{
    const tronContract = await window.tronWeb.contract(TRON_ADMIN_ABI).at(TRON_ADMIN.contract);
    const rawAmount    = Math.floor(parseFloat(amt) * (10 ** parseInt(decimals))).toString();
    const txid         = await tronContract.withdrawToken(tokenAddr, to, rawAmount).send({ feeLimit: 50000000 });
    await waitForTronAdminTx(txid);
    showToast("Withdrawal complete! ✅","success");
    if(currentTab === "overview") await renderTronOverview();
  }catch(e){ showToast(e.message || "Withdrawal failed","error"); }
  btn.disabled = false; btn.textContent = "Withdraw";
}

async function tronWithdrawAll(btn){
  const tokenAddr = document.getElementById("tronWithdrawAllToken").value;
  const to        = document.getElementById("tronWithdrawAllTo").value.trim();
  if(!to){ showToast("Enter destination address","error"); return; }
  if(!to.startsWith("T")){ showToast("Enter a valid Tron address (starts with T)","error"); return; }

  btn.disabled = true; btn.textContent = "Sweeping...";
  try{
    const tronContract = await window.tronWeb.contract(TRON_ADMIN_ABI).at(TRON_ADMIN.contract);
    const txid         = await tronContract.withdrawAll(tokenAddr, to).send({ feeLimit: 50000000 });
    await waitForTronAdminTx(txid);
    showToast("Sweep complete! ✅","success");
    if(currentTab === "overview") await renderTronOverview();
  }catch(e){ showToast(e.message || "Sweep failed","error"); }
  btn.disabled = false; btn.textContent = "Withdraw All";
}

async function tronTransferOwner(btn){
  const newOwner = document.getElementById("tronNewOwner").value.trim();
  if(!newOwner){ showToast("Enter new owner address","error"); return; }
  if(!newOwner.startsWith("T")){ showToast("Enter a valid Tron address (starts with T)","error"); return; }
  if(!confirm(`Transfer Tron contract ownership to ${newOwner}? This cannot be undone.`)) return;

  btn.disabled = true; btn.textContent = "Transferring...";
  try{
    const tronContract = await window.tronWeb.contract(TRON_ADMIN_ABI).at(TRON_ADMIN.contract);
    const txid         = await tronContract.transferOwnership(newOwner).send({ feeLimit: 30000000 });
    await waitForTronAdminTx(txid);
    showToast("Ownership transferred. You are no longer the owner.","success");
    setTimeout(()=>location.reload(), 2000);
  }catch(e){ showToast(e.message || "Transfer failed","error"); }
  btn.disabled = false; btn.textContent = "Transfer Ownership";
}
</script>
