[build]
publish = "site"
functions = "netlify/functions"

[functions]
external_node_modules = ["ethers"]

# Security headers
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
Pragma = "no-cache"
Expires = "0"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
Pragma = "no-cache"
Expires = "0"

[[headers]]
for = "/admin/*"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

# Redirects for SPA (send everything to index.html)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
